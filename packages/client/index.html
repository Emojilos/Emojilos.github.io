<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrowserStrike</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #game { display: block; width: 100%; height: 100%; }
    #game { display: none; }
    #ui-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #ui-root > * { pointer-events: auto; }
    .screen {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: #ccc; font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
    }

    /* Menu panel */
    .menu-panel {
      width: 360px; padding: 40px 32px;
      background: #16213e; border-radius: 12px;
      border: 1px solid #0f3460;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; gap: 12px;
    }
    .menu-title {
      font-size: 2rem; font-weight: 700; text-align: center;
      color: #ff6b00; letter-spacing: 2px; margin-bottom: 0;
    }
    .menu-subtitle {
      font-size: 0.85rem; text-align: center;
      color: #666; margin-bottom: 8px;
    }
    .menu-label {
      font-size: 0.8rem; color: #888; text-transform: uppercase;
      letter-spacing: 1px;
    }
    .menu-input {
      width: 100%; padding: 10px 14px;
      background: #0f3460; border: 1px solid #1a4a7a;
      border-radius: 6px; color: #e0e0e0;
      font-size: 1rem; outline: none;
      transition: border-color 0.2s;
    }
    .menu-input:focus { border-color: #ff6b00; }
    .menu-input::placeholder { color: #555; }
    .menu-input:disabled { opacity: 0.5; cursor: not-allowed; }
    .menu-btn {
      padding: 12px 20px; border: none; border-radius: 6px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }
    .menu-btn:active { transform: scale(0.97); }
    .menu-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .menu-btn-primary {
      background: #ff6b00; color: #fff;
    }
    .menu-btn-primary:hover:not(:disabled) { background: #e65e00; }
    .menu-btn-secondary {
      background: #0f3460; color: #ccc; border: 1px solid #1a4a7a;
      flex-shrink: 0; padding: 10px 20px;
    }
    .menu-btn-secondary:hover:not(:disabled) { background: #163d6f; }
    .menu-divider {
      display: flex; align-items: center; gap: 12px;
      color: #555; font-size: 0.8rem; margin: 4px 0;
    }
    .menu-divider::before, .menu-divider::after {
      content: ''; flex: 1; height: 1px; background: #0f3460;
    }
    .menu-join-row {
      display: flex; gap: 8px;
    }
    .menu-code-input {
      flex: 1; text-align: center; font-size: 1.1rem;
      letter-spacing: 3px; font-weight: 600;
    }
    .menu-error {
      display: none; padding: 8px 12px;
      background: rgba(255,60,60,0.15); border: 1px solid #ff3c3c;
      border-radius: 6px; color: #ff6b6b; font-size: 0.85rem;
      text-align: center;
    }

    /* Lobby panel */
    .lobby-panel {
      width: 520px; padding: 32px 28px;
      background: #16213e; border-radius: 12px;
      border: 1px solid #0f3460;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; gap: 16px;
    }
    .lobby-header { text-align: center; }
    .lobby-code-label {
      font-size: 0.75rem; color: #666; text-transform: uppercase;
      letter-spacing: 1px;
    }
    .lobby-code-row {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin-top: 4px;
    }
    .lobby-code {
      font-size: 2rem; font-weight: 700; letter-spacing: 6px;
      color: #ff6b00; font-family: 'Courier New', monospace;
    }
    .lobby-copy-btn {
      padding: 6px 14px; border: 1px solid #1a4a7a;
      border-radius: 4px; background: #0f3460;
      color: #aaa; font-size: 0.8rem; cursor: pointer;
      transition: background-color 0.2s;
    }
    .lobby-copy-btn:hover { background: #163d6f; color: #fff; }
    .lobby-teams {
      display: flex; gap: 12px; align-items: stretch;
    }
    .lobby-team-col {
      flex: 1; display: flex; flex-direction: column; gap: 8px;
    }
    .lobby-team-header {
      text-align: center; font-size: 0.85rem; font-weight: 600;
      padding: 6px 0; border-radius: 4px; text-transform: uppercase;
      letter-spacing: 1px;
    }
    .lobby-team-a-header { background: rgba(50,120,220,0.2); color: #5b9dff; }
    .lobby-team-b-header { background: rgba(220,60,60,0.2); color: #ff5b5b; }
    .lobby-team-list {
      flex: 1; min-height: 60px; padding: 8px;
      background: #0f3460; border-radius: 6px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .lobby-team-empty {
      color: #444; font-size: 0.8rem; text-align: center;
      padding: 12px 0;
    }
    .lobby-team-player {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 8px; border-radius: 4px;
      background: rgba(255,255,255,0.03);
    }
    .lobby-player-name { color: #ccc; font-size: 0.9rem; }
    .lobby-player-local { color: #ff6b00; font-weight: 600; }
    .lobby-admin-badge {
      font-size: 0.65rem; color: #ff6b00; font-weight: 700;
      background: rgba(255,107,0,0.15); padding: 2px 6px;
      border-radius: 3px; letter-spacing: 1px;
    }
    .lobby-vs {
      display: flex; align-items: center; justify-content: center;
      color: #444; font-weight: 700; font-size: 0.9rem;
      min-width: 32px;
    }
    .lobby-team-btn {
      width: 100%; padding: 8px; font-size: 0.85rem;
    }
    .lobby-team-a-btn { border: 1px solid rgba(50,120,220,0.3); }
    .lobby-team-a-btn:hover:not(:disabled) { background: rgba(50,120,220,0.15); }
    .lobby-team-a-btn.lobby-team-btn-active {
      background: rgba(50,120,220,0.25); border-color: #5b9dff;
    }
    .lobby-team-b-btn { border: 1px solid rgba(220,60,60,0.3); }
    .lobby-team-b-btn:hover:not(:disabled) { background: rgba(220,60,60,0.15); }
    .lobby-team-b-btn.lobby-team-btn-active {
      background: rgba(220,60,60,0.25); border-color: #ff5b5b;
    }
    .lobby-unassigned {
      font-size: 0.8rem; color: #666; text-align: center; padding: 4px 0;
    }
    .lobby-unassigned-label { color: #555; }
    .lobby-settings {
      padding: 12px; background: rgba(0,0,0,0.2); border-radius: 6px;
    }
    .lobby-settings-title {
      font-size: 0.75rem; color: #666; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .lobby-settings-grid {
      display: flex; flex-direction: column; gap: 8px;
    }
    .lobby-setting-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .lobby-setting-label { font-size: 0.85rem; color: #aaa; }
    .lobby-select {
      padding: 6px 10px; background: #0f3460;
      border: 1px solid #1a4a7a; border-radius: 4px;
      color: #ccc; font-size: 0.85rem; outline: none; cursor: pointer;
    }
    .lobby-select:focus { border-color: #ff6b00; }
    .lobby-select:disabled { opacity: 0.5; cursor: not-allowed; }
    .lobby-status {
      text-align: center; font-size: 0.85rem; color: #888; padding: 4px 0;
    }
    .lobby-bottom-row {
      display: flex; gap: 12px; justify-content: space-between;
    }
    .lobby-start-btn { flex: 1; }

    /* Game HUD */
    .game-hud {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; font-family: 'Segoe UI', Arial, sans-serif;
      z-index: 10;
    }

    /* Crosshair */
    .hud-crosshair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .hud-cross-h, .hud-cross-v {
      position: absolute; background: #00ff44;
    }
    .hud-cross-h {
      width: 20px; height: 2px;
      top: -1px; left: -10px;
      box-shadow: 0 0 2px rgba(0,0,0,0.8);
    }
    .hud-cross-v {
      width: 2px; height: 20px;
      top: -10px; left: -1px;
      box-shadow: 0 0 2px rgba(0,0,0,0.8);
    }
    .hud-cross-dot {
      position: absolute; width: 2px; height: 2px;
      top: -1px; left: -1px; background: #00ff44;
    }

    /* Top center: score + timer */
    .hud-top-center {
      position: absolute; top: 16px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .hud-score {
      font-size: 1.6rem; font-weight: 700;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .hud-score-a { color: #5b9dff; }
    .hud-score-sep { color: #666; margin: 0 6px; }
    .hud-score-b { color: #ff5b5b; }
    .hud-timer {
      font-size: 0.95rem; color: #aaa;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    /* Bottom center: HP */
    .hud-bottom-center {
      position: absolute; bottom: 32px; left: 50%;
      transform: translateX(-50%);
    }
    .hud-hp {
      display: flex; align-items: center; gap: 6px;
      font-size: 1.5rem; font-weight: 700;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .hud-hp-icon {
      color: #ff3c3c; font-size: 1.2rem; font-weight: 700;
    }
    .hud-hp-value { color: #fff; }

    /* Bottom right: ammo + weapon */
    .hud-bottom-right {
      position: absolute; bottom: 32px; right: 32px;
      text-align: right;
    }
    .hud-ammo {
      font-size: 1.5rem; font-weight: 700;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .hud-ammo-current { color: #fff; }
    .hud-ammo-sep { color: #666; margin: 0 2px; }
    .hud-ammo-mag { color: #888; font-size: 1.1rem; }
    .hud-weapon-name {
      font-size: 0.8rem; color: #888; margin-top: 2px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    .hud-reload {
      font-size: 0.85rem; color: #ffaa00; margin-top: 4px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      animation: hud-reload-pulse 0.6s ease-in-out infinite;
    }
    @keyframes hud-reload-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Weapon Select Overlay */
    .weapon-select-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 10, 25, 0.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 20; gap: 16px;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .ws-title {
      font-size: 1.6rem; font-weight: 700; color: #ff6b00;
      letter-spacing: 3px; text-transform: uppercase;
    }
    .ws-timer {
      font-size: 2.2rem; font-weight: 700; color: #fff;
      text-shadow: 0 0 12px rgba(255, 107, 0, 0.6);
    }
    .ws-cards {
      display: flex; gap: 20px; margin-top: 8px;
    }
    .ws-card {
      position: relative; width: 200px; padding: 20px 16px;
      background: #16213e; border: 2px solid #1a4a7a;
      border-radius: 10px; cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex; flex-direction: column; gap: 8px;
    }
    .ws-card:hover {
      border-color: #ff8c3a; transform: translateY(-4px);
      box-shadow: 0 6px 20px rgba(255, 107, 0, 0.15);
    }
    .ws-card-selected {
      border-color: #ff6b00 !important;
      box-shadow: 0 0 16px rgba(255, 107, 0, 0.3), inset 0 0 20px rgba(255, 107, 0, 0.05) !important;
    }
    .ws-card-name {
      font-size: 1.2rem; font-weight: 700; color: #fff;
      text-align: center;
    }
    .ws-card-type {
      font-size: 0.7rem; color: #888; text-align: center;
      letter-spacing: 2px;
    }
    .ws-card-stats {
      display: flex; flex-direction: column; gap: 4px;
      margin-top: 4px;
    }
    .ws-stat {
      display: flex; justify-content: space-between;
      font-size: 0.8rem;
    }
    .ws-stat-label { color: #888; }
    .ws-stat-value { color: #ccc; font-weight: 600; }
    .ws-card-auto {
      position: absolute; top: 8px; right: 8px;
      font-size: 0.6rem; font-weight: 700;
      color: #00cc66; background: rgba(0, 204, 102, 0.15);
      padding: 2px 6px; border-radius: 3px;
      letter-spacing: 1px;
    }

    /* Damage Effects container */
    .damage-effects {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 11;
    }

    /* Damage vignette edges — red gradient from screen edge inward */
    .damage-vignette {
      position: absolute; pointer-events: none;
    }
    .vignette-top {
      top: 0; left: 0; width: 100%; height: 30%;
      background: linear-gradient(to bottom, rgba(255, 0, 0, 0.7), transparent);
    }
    .vignette-bottom {
      bottom: 0; left: 0; width: 100%; height: 30%;
      background: linear-gradient(to top, rgba(255, 0, 0, 0.7), transparent);
    }
    .vignette-left {
      top: 0; left: 0; width: 30%; height: 100%;
      background: linear-gradient(to right, rgba(255, 0, 0, 0.7), transparent);
    }
    .vignette-right {
      top: 0; right: 0; width: 30%; height: 100%;
      background: linear-gradient(to left, rgba(255, 0, 0, 0.7), transparent);
    }

    /* Hitmarker — 4 diagonal lines around crosshair center */
    .hitmarker {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
    }
    .hitmarker-line {
      position: absolute; width: 8px; height: 2px;
      background: #fff;
    }
    .hitmarker-tl {
      top: 2px; left: 2px;
      transform: rotate(-45deg);
    }
    .hitmarker-tr {
      top: 2px; right: 2px;
      transform: rotate(45deg);
    }
    .hitmarker-bl {
      bottom: 2px; left: 2px;
      transform: rotate(45deg);
    }
    .hitmarker-br {
      bottom: 2px; right: 2px;
      transform: rotate(-45deg);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui-root">
    <div id="menu-screen" class="screen">BrowserStrike — Menu</div>
    <div id="lobby-screen" class="screen" style="display:none">Lobby</div>
    <div id="playing-screen" class="screen" style="display:none"></div>
    <div id="match-end-screen" class="screen" style="display:none">Match End</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
