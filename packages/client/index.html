<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrowserStrike</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    #game { display: block; width: 100%; height: 100%; }
    #game { display: none; }
    #ui-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #ui-root > * { pointer-events: auto; }
    .screen { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #ccc; font-family: 'Segoe UI', Arial, sans-serif; font-size: 1.5rem; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui-root">
    <div id="menu-screen" class="screen">BrowserStrike — Menu</div>
    <div id="lobby-screen" class="screen" style="display:none">Lobby</div>
    <div id="playing-screen" class="screen" style="display:none"></div>
    <div id="match-end-screen" class="screen" style="display:none">Match End</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
